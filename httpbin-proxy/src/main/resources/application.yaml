server:
  port: 8091
  tomcat:
    threads:
      max: 800
      min-spare: 100
    accept-count: 500

spring:
  application:
    name: httpbin-proxy

simulation:
  # Deterministic 15ms delay for all endpoints (fair benchmark)
  latency_ms: 15
  # Disable failures for benchmark (can be re-enabled for failure testing)
  failure_rate: 0.0

logging:
  level:
    com.mal.lospoc.httpbin: INFO
