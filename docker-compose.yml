version: '3.8'

services:
  restate:
    image: restatedev/restate:latest
    container_name: restate-server
    ports:
      - "8080:8080"   # Ingress API
      - "9070:9070"   # Admin API + Web UI
    environment:
      - RUST_LOG=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - restate-data:/restate-data

volumes:
  restate-data:
