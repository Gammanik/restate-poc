services:
  # Restate Server
  restate:
    image: restatedev/restate:1.2
    ports:
      - "8080:8080"
      - "9070:9070"
    environment:
      - RUST_LOG=info
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres

  # Temporal UI
  temporal-ui:
    image: temporalio/ui:2.28.0
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # PostgreSQL (for Temporal)
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"

volumes:
  restate-data:
